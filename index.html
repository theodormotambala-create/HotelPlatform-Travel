<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- SEO -->
  <title>HotelPlatform Travel</title>
  <meta name="description" content="Réservez hotels et restaurants, découvrez, partagez et échangez avec la communauté voyageurs." />
  <meta name="keywords" content="hotel, restaurant, reservation, voyage, travel, booking" />
  <meta name="robots" content="index, follow" />

  <!-- PWA / Theme -->
  <meta name="theme-color" content="#FF6B00" />
  <meta name="color-scheme" content="dark" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="HotelPlatform Travel" />
  <meta property="og:description" content="Réservez hotels et restaurants, découvrez, partagez et échangez." />
  <meta property="og:image"       content="icons/icon-512.png" />
  <meta property="og:locale"      content="fr_FR" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="HotelPlatform Travel" />
  <meta name="twitter:description" content="Réservez hotels et restaurants, découvrez, partagez et échangez." />
  <meta name="twitter:image"       content="icons/icon-512.png" />

  <!-- Apple / iOS -->
  <meta name="mobile-web-app-capable"                content="yes" />
  <meta name="apple-mobile-web-app-capable"          content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title"            content="HotelPlatform" />

  <!-- Apple touch icons — toutes tailles requises par l'App Store -->
  <link rel="apple-touch-icon"                href="icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />

  <!-- Apple splash screens (iPhone & iPad) -->
  <link rel="apple-touch-startup-image" media="screen and (device-width:440px)  and (device-height:956px)  and (-webkit-device-pixel-ratio:3)" href="icons/icon-1024.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width:402px)  and (device-height:874px)  and (-webkit-device-pixel-ratio:3)" href="icons/icon-1024.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width:430px)  and (device-height:932px)  and (-webkit-device-pixel-ratio:3)" href="icons/icon-1024.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width:390px)  and (device-height:844px)  and (-webkit-device-pixel-ratio:3)" href="icons/icon-1024.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width:375px)  and (device-height:667px)  and (-webkit-device-pixel-ratio:2)" href="icons/icon-512.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width:1024px) and (device-height:1366px) and (-webkit-device-pixel-ratio:2)" href="icons/icon-1024.png" />
  <link rel="apple-touch-startup-image" media="screen and (device-width:820px)  and (device-height:1180px) and (-webkit-device-pixel-ratio:2)" href="icons/icon-1024.png" />

  <!-- Microsoft / Windows -->
  <meta name="msapplication-TileColor" content="#FF6B00" />
  <meta name="msapplication-TileImage" content="icons/icon-144.png" />
  <meta name="msapplication-config"    content="none" />

  <!-- Favicon navigateur -->
  <link rel="icon"          type="image/svg+xml" href="logo.svg" />
  <link rel="icon"          type="image/png" sizes="32x32"   href="icons/icon-48.png" />
  <link rel="icon"          type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="shortcut icon" href="icons/icon-48.png" />
</head>
<body>
  <div id="boot">
    <img class="logo" src="logo.svg" alt="HotelPlatform" />
  </div>
  <div id="root"></div>
  <script type="module" src="/main.jsx"></script>
</body>
</html>
